            <nav>

                    <li><a href="index.html">Home</a></li>

                </ul>
            </nav>

    <div class="container">
        <h1 class="section-title" style="margin-top: 50px;">Product &amp; Service Enquiry</h1>
        <p>Interested in our catering options, bulk orders, or have a question about a specific product? Let us know below.</p>

        <div class="enquiry-form-wrapper">
            <form id="enquiry-form" novalidate>
                <label for="enquiry-name">Full Name</label>
                <input type="text" id="enquiry-name" name="name" placeholder="Enter your name" required minlength="2" maxlength="100" pattern="[a-zA-Z\s]+">

                <label for="enquiry-email">Email Address</label>
                <input type="email" id="enquiry-email" name="email" placeholder="Enter your email" required>

                <label for="enquiry-phone">Phone Number</label>
                <input type="tel" id="enquiry-phone" name="phone" placeholder="e.g. 072 123 4567" required pattern="[0-9\s\-\+]{10,15}">

                <label for="enquiry-type">Enquiry Type</label>
                <select id="enquiry-type" name="enquiry_type" required>
                    <option value="">Select an enquiry type</option>
                    <option value="product">Product Information</option>
                    <option value="catering">Catering &amp; Bulk Orders</option>
                    <option value="franchise">Franchise Opportunities</option>
                    <option value="partnership">Business Partnership</option>
                    <option value="other">Other</option>
                </select>

                <label for="enquiry-product">Product or Service Name</label>
                <input type="text" id="enquiry-product" name="product" placeholder="e.g. Zinger Burger, Family Feast" required minlength="2" maxlength="100">

                <label for="enquiry-message">Details</label>
                <textarea id="enquiry-message" name="message" rows="5" placeholder="Please provide details about your enquiry..." required minlength="20" maxlength="1000"></textarea>

                <div class="form-error" id="enquiry-error"></div>
                <div class="form-success" id="enquiry-success"></div>

                <button type="submit" class="btn" style="width: 100%; margin-top: 10px; border: none; cursor: pointer;">Submit Enquiry</button>
            </form>
        </div>
    </div>
